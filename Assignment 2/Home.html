<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Homepage</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #fff;
    }

    header {
        background: black;
        color: white;
        padding: 15px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
    }

    header h1 {
        margin: 0;
        font-size: 24px;
    }

    nav {
        display: flex;
        gap: 15px;
    }

    nav a {
        color: white;
        text-decoration: none;
        font-family: Arial, sans-serif;
        font-weight: bold;
        transition: color 0.3s;
    }

    nav a:hover {
        color: #45a049;
    }

    #loginToggle {
        padding: 10px 20px;
        background-color: white;
        color: black;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        transition: background-color 0.3s, box-shadow 0.2s;
    }

    main {
        padding: 30px;
        max-width: 100%;
        margin: 0 auto;
    }

    h2 {
        margin-top: 0;
    }

    .food-section {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        margin-top: 20px;
    }

    .food-card {
        width: 150px;
        text-align: center;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        border-radius: 8px;
        overflow: hidden;
        background: #fff;
        transition: transform 0.2s;
    }

    .food-card:hover {
        transform: scale(1.05);
    }

    .food-card img {
        width: 100%;
        height: 100px;
        object-fit: cover;
    }

    #loginPanel {
        position: fixed;
        top: 0;
        right: -350px; 
        width: 350px;
        height: 100%;
        background: #fff;
        border-left: 1px solid #ddd;
        box-shadow: -5px 0 20px rgba(0,0,0,0.1);
        padding: 30px 20px;
        transition: right 0.3s ease;
        z-index: 1000;
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
    }

    #closeLogin {
        align-self: flex-end;
        font-size: 28px;
        font-weight: bold;
        border: none;
        background: transparent;
        cursor: pointer;
        color: #333;
        margin-bottom: 20px;
    }

    #loginPanel h2 {
        margin-top: 0;
        margin-bottom: 20px;
        font-size: 22px;
        text-align: center;
    }

    #loginPanel label {
        display: block;
        font-weight: bold;
        margin-top: 10px;
        margin-bottom: 5px;
    }

    #loginPanel input {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
    }

    #loginPanel button.submit-btn {
        margin-top: 20px;
        padding: 10px;
        width: 100%;
        background: #4CAF50;
        color: white;
        border: none;
        border-radius: 4px;
        font-weight: bold;
        cursor: pointer;
        font-size: 16px;
    }

    #loginPanel button.submit-btn:hover {
        background: #45a049;
    }

    @media(max-width: 768px) {
        header {
            flex-direction: column;
            align-items: flex-start;
        }

        nav {
            margin-top: 10px;
        }

        .food-section {
            justify-content: center;
        }
    }
</style>
</head>
<body>

<header>
    <h1>Consum</h1>
    <nav>
        <a href="Home.html">Home</a>
        <a href="Biling.html">Billing</a>
        <a href="Plan.html">Plans</a>
    </nav>
    <button id="loginToggle">Login</button>
</header>

<main>
    <h2>Welcome to Consum</h2>
    <p><b>Available to order</b></p>
    <div class="food-section">
        <div class="food-card">
            <img src="Chicken-rice-meal-prep-9-1.jpg" alt="chicken-teriyaki">
            <p>High Protein Chicken Teriyaki rice meal</p>
        </div>
        <div class="food-card">
            <img src="Teriyaki-Ground-Beef-Bowls-WP.jpg" alt="beef-teriyaki">
            <p>Delicious Beef Teriyaki rice meal with vegetalble</p>
        </div>
        <div class="food-card">
            <img src="1403_Spinach_Lavash_High-Protein_Breakfast_Wrap_Meal_Prep.webp" alt="breakfast">
            <p>Healthy Spinach breakfast wrap</p>
        </div>
    </div>
</main>

<div id="loginPanel" aria-hidden="true">
    <button id="closeLogin" aria-label="Close login panel">&times;</button>
    <h2>Login</h2>
    <form>
        <label for="user">User:</label>
        <input type="text" id="user" name="user" placeholder="Enter username" required>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required>
        <button type="submit" class="submit-btn">Submit</button>
    </form>
</div>

<script>
    const loginToggle = document.getElementById('loginToggle');
    const loginPanel = document.getElementById('loginPanel');
    const closeLogin = document.getElementById('closeLogin');

    loginToggle.addEventListener('click', () => {
        loginPanel.style.right = '0';
        loginPanel.setAttribute('aria-hidden', 'false');
    });

    closeLogin.addEventListener('click', () => {
        loginPanel.style.right = '-350px';
        loginPanel.setAttribute('aria-hidden', 'true');
    });
</script>

</body>
</html>
